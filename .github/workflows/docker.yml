name: Docker

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  IMAGE: flugmaschine/hand-tracking-drawing

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Docker Hub description
        env:
          HUB_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          HUB_PASS: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          token=$(jq -n --arg u "$HUB_USER" --arg p "$HUB_PASS" '{username:$u,password:$p}' \
            | curl -sS -f -X POST https://hub.docker.com/v2/users/login/ \
                -H 'Content-Type: application/json' --data-binary @- \
            | jq -r .token)
          jq -n --rawfile d DOCKERHUB.md '{full_description:$d}' \
            | curl -sS -f -X PATCH "https://hub.docker.com/v2/repositories/$HUB_USER/hand-tracking-drawing/" \
                -H "Authorization: JWT $token" \
                -H 'Content-Type: application/json' --data-binary @- \
            | jq -r '"description updated: \(.name) (\(.full_description | length) chars)"'
